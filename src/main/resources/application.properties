spring.application.name=fenix

# Server configuration
server.port=${SERVER_PORT:8088}

# Database configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fenix_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações do JWT
jwt.secret=FenixProjectSecretKeySuperSeguraParaGarantirAProtecaoDosPacientes2026!@#
jwt.expiration=86400000

# Limites de upload de arquivo
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB